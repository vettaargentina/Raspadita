<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Raspadita VETTA — ¡Raspá y descubrí tu premio al instante!">
  <meta name="theme-color" content="#0A0A0F">
  <title>Raspadita VETTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="card-page">

  <!-- Loading -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
  </div>

  <!-- App root -->
  <div id="app"></div>

  <!-- Confetti container -->
  <div id="confetti-container"></div>

  <!--
    Firebase anti-cheat (opcional).
    Si firebase-config.js existe y tiene FIREBASE_CONFIG válido,
    se cargan las SDKs de Firebase y se inicializa la base de datos.
    Si no existe, la app funciona igual pero solo con localStorage.
  -->
  <script src="firebase-config.js" onerror="window.__noFirebase=true"></script>
  <script>
    (function () {
      if (window.__noFirebase) return;
      var cfg = window.FIREBASE_CONFIG;
      if (!cfg || !cfg.databaseURL || cfg.databaseURL.indexOf('TU-PROYECTO') !== -1) return;

      function loadScript(src, onload) {
        var s = document.createElement('script');
        s.src = src; s.onload = onload;
        document.head.appendChild(s);
      }

      var CDN = 'https://www.gstatic.com/firebasejs/10.7.1/';
      loadScript(CDN + 'firebase-app-compat.js', function () {
        loadScript(CDN + 'firebase-database-compat.js', function () {
          try {
            firebase.initializeApp(cfg);
            window.__firebaseDB = firebase.database();
            console.log('✅ Firebase conectado — control global de cartones activo');
          } catch (e) {
            console.warn('Firebase init failed:', e.message);
          }
        });
      });
    })();
  </script>

  <script src="card.js"></script>
</body>
</html>
